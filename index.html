<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
    content="Landing page tổng hợp các học phần của Viện Trí tuệ nhân tạo, Trường Đại học Công nghệ, Đại học Quốc gia Hà Nội.">
  <title>IAI Courses | Trường Đại học Công nghệ</title>
<link rel="stylesheet" href="assets/styles.css">
  <script defer src="assets/courses.js"></script>
  <script defer src="assets/app.js"></script>
</head>

<body>
<main class="shell">
    <section class="hero">
      <p class="eyebrow">IAI · UET · VNU</p>
      <h1>Các học phần tại IAI</h1>
      <p class="hero-lead">
        Slide bài giảng, lịch học và tài liệu các môn học của Viện Trí tuệ nhân tạo.
      </p>
      <div class="hero-actions">
        <a class="button button-primary" href="#course-grid">Xem học phần</a>
      </div>
    </section>

    <section class="section">
      <div class="section-heading">
        <div>
          <p class="section-kicker">Danh mục học phần</p>
          <h2>Học phần</h2>
        </div>
      </div>
      <div class="course-grid" id="course-grid" aria-live="polite"></div>
    </section>

    <footer class="footer">
      <p>Viện Trí tuệ nhân tạo · Trường Đại học Công nghệ · Đại học Quốc gia Hà Nội</p>
    </footer>
  </main>
</body>

</html>
